name: CI (reports — freshness + PROM/photo validation)

# Path-gated: only runs when a report generator or its input data changes. These
# steps regenerate committed evidence reports and fail if the committed copy is
# stale, plus validate the physical PROM captures and the owner photos. The
# autonomous routing loop touches only kicad/*routed* + kicad routing scripts +
# docs/, none of which are gated here, so it does not trigger this workflow.
# Needs Git LFS for the photo checks (ref/photos/**/*.jpg).

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'tools/**'
      - 'ref/**'
      - 'roms/**'
      - 'media/**'
      - 'kicad/juku.board.json'
      - 'kicad/report_*.py'
      - 'kicad/patch_d94_input_boundaries.py'
      - 'kicad/apply_kp12_resistor_links.py'
      - 'kicad/apply_d94_pullup_footprints.py'
      - 'kicad/apply_d105_h_closure.py'
      - 'kicad/check_d94_pullups.py'
      - 'kicad/check_kp12_resistor_links.py'
      - 'kicad/check_factory_wire_links.py'
      - 'kicad/check_factory_wire_landing_registration.py'
      - '.github/workflows/reports.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tools/**'
      - 'ref/**'
      - 'roms/**'
      - 'media/**'
      - 'kicad/juku.board.json'
      - 'kicad/report_*.py'
      - 'kicad/patch_d94_input_boundaries.py'
      - 'kicad/apply_kp12_resistor_links.py'
      - 'kicad/apply_d94_pullup_footprints.py'
      - 'kicad/apply_d105_h_closure.py'
      - 'kicad/check_d94_pullups.py'
      - 'kicad/check_kp12_resistor_links.py'
      - 'kicad/check_factory_wire_links.py'
      - 'kicad/check_factory_wire_landing_registration.py'
      - '.github/workflows/reports.yml'

jobs:
  reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The photo checks validate the 50 + 26 owner photographs as
          # materialized JPEG evidence; checkout's default leaves LFS pointer stubs.
          lfs: true

      - name: Validate photos and vendored reference artifacts
        run: |
          python3 scripts/photo_registration.py validate
          ./sync/reference_artifact_check.sh

      - name: Check factory modification registration freshness
        run: |
          python3 scripts/report_factory_modification_disposition.py
          git diff --exit-code -- docs/factory-modification-disposition.md

      - name: Check factory insulated-link endpoint map
        run: |
          python3 kicad/check_factory_wire_links.py
          python3 kicad/check_factory_wire_landing_registration.py

      - name: Check unmodeled footprint inventory freshness
        run: |
          python3 scripts/report_unmodeled_footprint_inventory.py
          git diff --exit-code -- docs/unmodeled-footprint-inventory.md

      - name: Check RE3 firmware inspection freshness
        run: |
          python3 scripts/report_re3_firmware_inspection.py
          git diff --exit-code -- \
            docs/re3-firmware-inspection.md \
            ref/firmware/SHA256SUMS

      - name: Check reconstructed PROM export freshness
        run: |
          python3 scripts/export_reconstructed_proms.py
          git diff --exit-code -- \
            docs/reconstructed-prom-fallbacks.md \
            ref/reconstructed-proms/SHA256SUMS \
            ref/reconstructed-proms/d8_re3_rom_pager_reconstructed.bin \
            ref/reconstructed-proms/d8_re3_rom_pager_reconstructed.hex

      - name: Validate physical RT4 captures
        run: |
          rm -rf /tmp/d2-validate /tmp/d6-validate
          python3 scripts/validate_rt4_dump.py \
            ref/physical-proms/captures/d2_037_20260713_capture1.txt \
            ref/physical-proms/captures/d2_037_20260713_capture2.txt \
            ref/physical-proms/captures/d2_037_20260713_capture3_powercycled.txt \
            ref/physical-proms/captures/d2_037_sukharev_reference_20260713_verify1.txt \
            ref/physical-proms/captures/d2_037_arvutimuuseum_CS00015_20260713_capture1.txt \
            ref/physical-proms/captures/d2_037_arvutimuuseum_CS00015_20260713_capture2.txt \
            ref/physical-proms/captures/d2_037_arvutimuuseum_CS00015_20260713_capture3_powercycled.txt \
            --independent-capture-count 4 \
            --alias-note "The unqualified and arvutimuuseum_CS00015 three-read names are byte-for-byte aliases of the same supplied events; the separate sukharev_reference verification is independent." \
            --out-dir /tmp/d2-validate --name d2_037
          python3 scripts/validate_rt4_dump.py \
            ref/physical-proms/captures/d6_038_20260713_capture1.txt \
            ref/physical-proms/captures/d6_038_20260713_capture2.txt \
            ref/physical-proms/captures/d6_038_arvutimuuseum_CS00015_20260713_capture1.txt \
            ref/physical-proms/captures/d6_038_arvutimuuseum_CS00015_20260713_capture2.txt \
            ref/physical-proms/captures/d6_038_arvutimuuseum_CS00015_20260713_capture3_powercycled.txt \
            --independent-capture-count 3 \
            --alias-note "The unqualified and arvutimuuseum_CS00015 capture1/capture2 names are byte-for-byte aliases of the same supplied events; the power-cycled third read is independent." \
            --out-dir /tmp/d6-validate --name d6_038
          cmp ref/physical-proms/captures/d2_037_20260713_capture1.txt \
            ref/physical-proms/captures/d2_037_arvutimuuseum_CS00015_20260713_capture1.txt
          cmp ref/physical-proms/captures/d2_037_20260713_capture2.txt \
            ref/physical-proms/captures/d2_037_arvutimuuseum_CS00015_20260713_capture2.txt
          cmp ref/physical-proms/captures/d2_037_20260713_capture3_powercycled.txt \
            ref/physical-proms/captures/d2_037_arvutimuuseum_CS00015_20260713_capture3_powercycled.txt
          cmp ref/physical-proms/captures/d6_038_20260713_capture1.txt \
            ref/physical-proms/captures/d6_038_arvutimuuseum_CS00015_20260713_capture1.txt
          cmp ref/physical-proms/captures/d6_038_20260713_capture2.txt \
            ref/physical-proms/captures/d6_038_arvutimuuseum_CS00015_20260713_capture2.txt
          for suffix in raw.bin asserted.bin raw.hex dump.json; do
            cmp "/tmp/d2-validate/d2_037.$suffix" "ref/physical-proms/validated/d2_037.$suffix"
            cmp "/tmp/d6-validate/d6_038.$suffix" "ref/physical-proms/validated/d6_038.$suffix"
          done

      - name: Validate physical RE3 captures
        run: |
          rm -rf /tmp/d8-validate /tmp/d94-validate
          python3 scripts/validate_re3_dump.py \
            ref/physical-proms/captures/d8_039_arvutimuuseum_CS00015_20260713_capture1.txt \
            ref/physical-proms/captures/d8_039_arvutimuuseum_CS00015_20260713_capture2.txt \
            ref/physical-proms/captures/d8_039_arvutimuuseum_CS00015_20260713_capture3_powercycled.txt \
            ref/physical-proms/captures/d8_039_sukharev_reference_20260713_capture1.txt \
            ref/physical-proms/captures/d8_039_sukharev_reference_20260713_capture2.txt \
            ref/physical-proms/captures/d8_039_sukharev_reference_20260713_capture3_powercycled.txt \
            --independent-capture-count 3 \
            --alias-note "The sukharev_reference and arvutimuuseum_CS00015 names are byte-for-byte aliases of the same three supplied read events; both labels are retained for provenance." \
            --out-dir /tmp/d8-validate --name d8_039
          python3 scripts/validate_re3_dump.py \
            ref/physical-proms/captures/d94_092_arvutimuuseum_CS00015_20260713_capture1.txt \
            ref/physical-proms/captures/d94_092_arvutimuuseum_CS00015_20260713_capture2.txt \
            ref/physical-proms/captures/d94_092_arvutimuuseum_CS00015_20260713_capture3_powercycled.txt \
            ref/physical-proms/captures/d94_092_sukharev_reference_20260713_capture1.txt \
            ref/physical-proms/captures/d94_092_sukharev_reference_20260713_capture2.txt \
            ref/physical-proms/captures/d94_092_sukharev_reference_20260713_capture3_powercycled.txt \
            --independent-capture-count 3 \
            --alias-note "The sukharev_reference and arvutimuuseum_CS00015 names are byte-for-byte aliases of the same three supplied read events; both labels are retained for provenance." \
            --out-dir /tmp/d94-validate --name d94_092
          for part in d8_039 d94_092; do
            for capture in capture1 capture2 capture3_powercycled; do
              cmp "ref/physical-proms/captures/${part}_arvutimuuseum_CS00015_20260713_${capture}.txt" \
                "ref/physical-proms/captures/${part}_sukharev_reference_20260713_${capture}.txt"
            done
            for suffix in raw.bin asserted.bin raw.hex dump.json; do
              cmp "/tmp/${part%%_*}-validate/$part.$suffix" \
                "ref/physical-proms/validated/$part.$suffix"
            done
          done
          (cd ref/physical-proms && sha256sum -c SHA256SUMS)

      - name: Check physical D6 decode report freshness
        run: |
          python3 scripts/report_d6_physical_decode.py
          git diff --exit-code -- docs/d6-physical-decode.md

      - name: Check physical D8 decode report freshness
        run: |
          python3 scripts/report_d8_physical_decode.py
          git diff --exit-code -- docs/d8-physical-decode.md

      - name: Check D6 firmware mode coverage freshness
        run: |
          python3 scripts/report_d6_firmware_modes.py
          git diff --exit-code -- docs/d6-firmware-mode-coverage.md

      - name: Check physical D2 truth report freshness
        run: |
          python3 scripts/report_d2_physical_truth.py
          git diff --exit-code -- docs/d2-physical-truth.md

      - name: Check firmware gap ledger freshness
        run: |
          python3 scripts/export_eprom_pair.py
          git diff --exit-code -- \
            docs/eprom-programming-images.md \
            ref/eprom-images/SHA256SUMS \
            ref/eprom-images/d15_ekta37_low.bin \
            ref/eprom-images/d16_ekta37_high.bin
          python3 scripts/report_firmware_gap_ledger.py
          git diff --exit-code -- docs/firmware-gap-ledger.md

      - name: Check board fidelity gap ledger freshness
        run: |
          python3 scripts/report_board_fidelity_gap_ledger.py
          git diff --exit-code -- docs/board-fidelity-gap-ledger.md

      - name: Check DRAM ground rail closure
        run: python3 scripts/close_array_ground_rail.py

      - name: Check D30 status-strobe closure
        run: python3 scripts/close_d30_status_strobe.py

      - name: Check decap value fidelity freshness
        run: |
          python3 scripts/report_decap_value_fidelity.py
          git diff --exit-code -- docs/decap-value-fidelity.md

      - name: Check RAS resistor-bank fidelity freshness
        run: |
          python3 scripts/report_ras_resistor_bank.py
          git diff --exit-code -- docs/ras-resistor-bank.md

      - name: Check D41 timing boundary freshness
        run: |
          python3 scripts/report_d41_timing_boundary.py
          git diff --exit-code -- docs/d41-timing-boundary.md

      - name: Check memory timing boundary freshness
        run: |
          python3 scripts/report_memory_timing_boundary.py
          git diff --exit-code -- docs/memory-timing-boundary.md

      - name: Check I/O decode boundary freshness
        run: |
          python3 scripts/report_io_decode_boundary.py
          git diff --exit-code -- docs/io-decode-boundary.md

      - name: Check video analog boundary freshness
        run: |
          python3 scripts/report_video_analog_boundary.py
          git diff --exit-code -- docs/video-analog-boundary.md

      - name: Check S4 interrupt boundary freshness
        run: |
          python3 scripts/report_s4_interrupt_boundary.py
          git diff --exit-code -- docs/s4-interrupt-boundary.md

      - name: Check EKDOS source inspection freshness
        run: |
          python3 scripts/report_ekdos_source_inspection.py
          git diff --exit-code -- docs/ekdos-source-inspection.md

      - name: Check vendored disk catalog freshness
        run: |
          python3 scripts/report_vendored_disk_catalog.py
          git diff --exit-code -- docs/vendored-disk-catalog.md

      - name: Check BASIC disk extraction freshness
        run: |
          python3 scripts/extract_basic_disk_files.py
          git diff --exit-code -- \
            docs/basic-disk-extraction.md \
            ref/extracted-software/JUKPROG2_JBASIC.COM \
            ref/extracted-software/JUKPROG2_JBASIC_live_candidate.COM \
            ref/extracted-software/JUKU1_JBASIC_raw_candidate.COM \
            ref/extracted-software/README.md \
            ref/extracted-software/SHA256SUMS

      - name: Check cartridge BASIC firmware lineage freshness
        run: |
          python3 scripts/report_cartridge_basic_firmware_lineage.py
          git diff --exit-code -- docs/cartridge-basic-firmware-lineage.md

      - name: Check Monitor 2.2 reconstruction freshness
        run: |
          python3 scripts/report_jmon22_reconstruction.py
          git diff --exit-code -- \
            docs/jmon22-reconstruction.md \
            ref/reconstructed-firmware/jmon22-consensus-patch.json

      - name: Check source coverage audit freshness
        run: |
          python3 scripts/report_source_coverage_audit.py
          git diff --exit-code -- docs/source-coverage-audit.md

      - name: Check official .009 IC census freshness
        run: |
          python3 scripts/report_official_009_ic_census.py
          git diff --exit-code -- docs/official-009-ic-census.md

      - name: Check WD1772 PLA inspection freshness
        run: |
          python3 scripts/export_wd1772_pla.py
          python3 scripts/report_wd1772_pla_inspection.py
          git diff --exit-code -- \
            docs/wd1772-pla-inspection.md \
            ref/wd1772-vg93/SHA256SUMS \
            ref/wd1772-vg93/wd1772pla.normalized.csv \
            ref/wd1772-vg93/wd1772pla.normalized.json

      - name: Check video slot timing audit freshness
        run: |
          python3 scripts/report_d2_reconstruction_constraints.py
          python3 scripts/report_d94_reconstruction_constraints.py
          python3 scripts/report_d41_timing_boundary.py
          python3 scripts/report_video_slot_timing_audit.py
          git diff --exit-code -- \
            docs/d2-reconstruction-constraints.md \
            docs/d94-reconstruction-constraints.md \
            docs/d41-timing-boundary.md \
            docs/video-slot-timing-audit.md

      - name: Check FDC firmware/hardware polarity profile freshness
        run: |
          python3 scripts/report_fdc_bus_polarity.py
          git diff --exit-code -- docs/fdc-bus-polarity.md

      - name: Check owner measurement shortlist freshness
        run: |
          python3 scripts/report_fdc_hardware_handoff.py
          python3 scripts/report_serial_handoff.py
          python3 scripts/report_decap_value_fidelity.py
          python3 scripts/report_d41_timing_boundary.py
          python3 scripts/report_memory_timing_boundary.py
          python3 scripts/report_io_decode_boundary.py
          python3 scripts/report_video_analog_boundary.py
          python3 scripts/report_s4_interrupt_boundary.py
          python3 scripts/report_unmodeled_footprint_inventory.py
          python3 scripts/report_d30_section_b_scan_chase.py
          python3 scripts/report_8286_pinout_audit.py
          python3 scripts/report_8282_pinout_audit.py
          python3 scripts/report_package_endpoint_coverage.py
          python3 scripts/report_owner_measurement_shortlist.py
          git diff --exit-code -- \
            docs/fdc-hardware-handoff.md \
            docs/serial-handoff.md \
            docs/decap-value-fidelity.md \
            docs/d41-timing-boundary.md \
            docs/memory-timing-boundary.md \
            docs/io-decode-boundary.md \
            docs/video-analog-boundary.md \
            docs/s4-interrupt-boundary.md \
            docs/unmodeled-footprint-inventory.md \
            docs/d30-section-b-scan-chase.md \
            docs/8286-pinout-audit.md \
            docs/8282-pinout-audit.md \
            docs/package-endpoint-coverage.md \
            docs/owner-measurement-shortlist.md

      - name: Check replica bring-up report freshness
        run: |
          python3 kicad/report_replica_bringup_verification.py
          git diff --exit-code -- \
            docs/replica-bringup-verification-points.md

      - name: Check replica sourcing/BOM report freshness
        run: |
          python3 kicad/report_dual_config_bom.py
          python3 kicad/report_replica_sourcing_readiness.py
          git diff --exit-code -- \
            docs/replica-dual-config-bom.csv \
            docs/replica-dual-config-bom.md \
            docs/replica-sourcing-readiness.md
