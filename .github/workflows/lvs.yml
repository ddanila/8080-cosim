name: CI (status + LVS + boot regression)

on:
  push:
  pull_request:

jobs:
  status-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check readiness script syntax
        run: |
          sh -n kicad/check_replica_manufacturing_ready.sh
          python3 -m py_compile \
            scripts/report_milestone_ledger.py \
            kicad/report_replica_order_upload_runbook.py \
            kicad/report_replica_manufacturing_readiness.py

      - name: Check milestone ledger freshness
        run: |
          python3 scripts/report_milestone_ledger.py
          git diff --exit-code -- docs/milestone-ledger.md

  lvs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Yosys for the HDL netlist. KiCad is intentionally NOT installed: the
      # schematic is generated deterministically from the board spec, so check.sh
      # falls back to the KiCad-free board-direct LVS (same connectivity). This
      # avoids fragile KiCad-version/schematic-format mismatches in CI. The real
      # kicad-cli round-trip is exercised locally (KiCad 10).
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Run LVS check
        run: sh sync/check.sh

  boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # iverilog runs the vm80a-based HDL sims; gcc builds the cosim oracle.
      # boot_check.sh boots the real ekta37 BIOS through cosim AND all three HDL
      # sim levels, bounded to 6000 video writes (~30s, never the slow full banner),
      # and asserts every level is byte-for-byte identical to cosim -- i.e. the merge
      # (the schematic structure executing the firmware) cannot silently regress.
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y gcc iverilog

      - name: Run FDC regression checks
        run: |
          ./sync/juk_disk_check.sh
          ./sync/fdc_check.sh

      - name: Run fast subsystem guards
        run: |
          ./sync/basic_cart_check.sh
          ./sync/basic_launch_probe.py
          ./sync/beeper_check.sh
          ./sync/jmon33_hdl_probe.sh

      - name: Run boot regression check
        run: ./sync/boot_check.sh
