name: CI (status + LVS + boot regression)

on:
  push:
  pull_request:

jobs:
  status-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The status audit validates all 50 owner photographs as materialized
          # JPEG evidence; checkout's default leaves Git LFS pointer stubs.
          lfs: true

      - name: Check readiness script syntax
        run: |
          sh -n kicad/check_replica_manufacturing_ready.sh
          sh -n sync/ekdos_checkpoint_prompt_check.sh
          sh -n sync/ekdos_jbasic_checkpoint_check.sh
          sh -n sync/juku_top_jbasic_prompt_check.sh
          sh -n sync/juku_top_fdc_prompt_check.sh
          sh -n sync/juku_top_fdc_probe.sh
          sh -n sync/jmon33_checkpoint_deep_check.sh
          sh -n sync/video_timing_check.sh
          sh -n sync/video_readout_check.sh
          sh -n sync/serial_check.sh
          python3 -m py_compile \
            scripts/export_reconstructed_proms.py \
            scripts/extract_basic_disk_files.py \
            scripts/report_source_coverage_audit.py \
            scripts/check_documentation_consistency.py \
            scripts/report_ekdos_source_inspection.py \
            scripts/report_vendored_disk_catalog.py \
            scripts/report_re3_firmware_inspection.py \
            scripts/report_video_slot_timing_audit.py \
            scripts/report_d2_reconstruction_constraints.py \
            scripts/report_d94_reconstruction_constraints.py \
            scripts/report_owner_measurement_shortlist.py \
            scripts/report_fdc_hardware_handoff.py \
            scripts/report_serial_handoff.py \
            scripts/export_wd1772_pla.py \
            scripts/report_wd1772_pla_inspection.py \
            scripts/wd1772_pla.py \
            scripts/report_juku_top_fdc_alignment.py \
            scripts/report_firmware_gap_ledger.py \
            scripts/report_board_fidelity_gap_ledger.py \
            scripts/report_decap_value_fidelity.py \
            scripts/report_d41_timing_boundary.py \
            scripts/report_memory_timing_boundary.py \
            scripts/report_io_decode_boundary.py \
            scripts/report_video_analog_boundary.py \
            scripts/report_s4_interrupt_boundary.py \
            scripts/report_unmodeled_footprint_inventory.py \
            sync/ekdos_fdc_probe.py \
            sync/ekdos_jbasic_command_probe.py \
            sync/ekdos_timing_reference.py \
            sync/ekdos_checkpoint_reference.py \
            sync/ekdos_ioseq_reference.py \
            sync/juku_top_checkpoint_load_check.py \
            sync/juku_top_checkpoint_resume_probe.py \
            sync/juku_top_checkpoint_fdc_probe.py \
            sync/juku_top_checkpoint_jbasic_probe.py \
            sync/juku_top_checkpoint_jbasic_late_probe.py \
            sync/jmon33_interrupt_probe.py \
            sync/jmon33_ready_probe.py \
            sync/jmon33_command_probe.py \
            sync/jmon33_idle_command_probe.py \
            sync/jmon33_fdc_command_probe.py \
            sync/jmon33_checkpoint_cursor_probe.py \
            sync/jmon33_hdl_command_probe.py \
            sync/jmon33_hdl_a_command_probe.py \
            sync/jmon33_hdl_b_command_probe.py \
            sync/jmon33_hdl_fdc_command_probe.py \
            kicad/report_replica_bringup_verification.py \
            kicad/report_dual_config_bom.py \
            kicad/report_replica_order_upload_runbook.py \
            kicad/report_replica_order_evidence_template.py \
            kicad/report_replica_sourcing_readiness.py \
            kicad/report_replica_manufacturing_readiness.py

      - name: Check unmodeled footprint inventory freshness
        run: |
          python3 scripts/report_unmodeled_footprint_inventory.py
          git diff --exit-code -- docs/unmodeled-footprint-inventory.md

      - name: Check documentation consistency
        run: python3 scripts/check_documentation_consistency.py

      - name: Check vendored reference artifacts
        run: ./sync/reference_artifact_check.sh

      - name: Check RE3 firmware inspection freshness
        run: |
          python3 scripts/report_re3_firmware_inspection.py
          git diff --exit-code -- \
            docs/re3-firmware-inspection.md \
            ref/firmware/SHA256SUMS

      - name: Check reconstructed PROM export freshness
        run: |
          python3 scripts/export_reconstructed_proms.py
          git diff --exit-code -- \
            docs/reconstructed-prom-fallbacks.md \
            ref/reconstructed-proms/SHA256SUMS \
            ref/reconstructed-proms/d6_rt4_memory_decode_reconstructed.bin \
            ref/reconstructed-proms/d6_rt4_memory_decode_reconstructed.hex \
            ref/reconstructed-proms/d8_re3_rom_pager_reconstructed.bin \
            ref/reconstructed-proms/d8_re3_rom_pager_reconstructed.hex

      - name: Check firmware gap ledger freshness
        run: |
          python3 scripts/report_firmware_gap_ledger.py
          git diff --exit-code -- docs/firmware-gap-ledger.md

      - name: Check board fidelity gap ledger freshness
        run: |
          python3 scripts/report_board_fidelity_gap_ledger.py
          git diff --exit-code -- docs/board-fidelity-gap-ledger.md

      - name: Check decap value fidelity freshness
        run: |
          python3 scripts/report_decap_value_fidelity.py
          git diff --exit-code -- docs/decap-value-fidelity.md

      - name: Check D41 timing boundary freshness
        run: |
          python3 scripts/report_d41_timing_boundary.py
          git diff --exit-code -- docs/d41-timing-boundary.md

      - name: Check memory timing boundary freshness
        run: |
          python3 scripts/report_memory_timing_boundary.py
          git diff --exit-code -- docs/memory-timing-boundary.md

      - name: Check I/O decode boundary freshness
        run: |
          python3 scripts/report_io_decode_boundary.py
          git diff --exit-code -- docs/io-decode-boundary.md

      - name: Check video analog boundary freshness
        run: |
          python3 scripts/report_video_analog_boundary.py
          git diff --exit-code -- docs/video-analog-boundary.md

      - name: Check S4 interrupt boundary freshness
        run: |
          python3 scripts/report_s4_interrupt_boundary.py
          git diff --exit-code -- docs/s4-interrupt-boundary.md

      - name: Check EKDOS source inspection freshness
        run: |
          python3 scripts/report_ekdos_source_inspection.py
          git diff --exit-code -- docs/ekdos-source-inspection.md

      - name: Check vendored disk catalog freshness
        run: |
          python3 scripts/report_vendored_disk_catalog.py
          git diff --exit-code -- docs/vendored-disk-catalog.md

      - name: Check BASIC disk extraction freshness
        run: |
          python3 scripts/extract_basic_disk_files.py
          git diff --exit-code -- \
            docs/basic-disk-extraction.md \
            ref/extracted-software/JUKPROG2_JBASIC.COM \
            ref/extracted-software/JUKPROG2_JBASIC_live_candidate.COM \
            ref/extracted-software/JUKU1_JBASIC_raw_candidate.COM \
            ref/extracted-software/README.md \
            ref/extracted-software/SHA256SUMS

      - name: Check source coverage audit freshness
        run: |
          python3 scripts/report_source_coverage_audit.py
          git diff --exit-code -- docs/source-coverage-audit.md

      - name: Check WD1772 PLA inspection freshness
        run: |
          python3 scripts/export_wd1772_pla.py
          python3 scripts/report_wd1772_pla_inspection.py
          git diff --exit-code -- \
            docs/wd1772-pla-inspection.md \
            ref/wd1772-vg93/SHA256SUMS \
            ref/wd1772-vg93/wd1772pla.normalized.csv \
            ref/wd1772-vg93/wd1772pla.normalized.json

      - name: Check video slot timing audit freshness
        run: |
          python3 scripts/report_d2_reconstruction_constraints.py
          python3 scripts/report_d94_reconstruction_constraints.py
          python3 scripts/report_d41_timing_boundary.py
          python3 scripts/report_video_slot_timing_audit.py
          git diff --exit-code -- \
            docs/d2-reconstruction-constraints.md \
            docs/d94-reconstruction-constraints.md \
            docs/d41-timing-boundary.md \
            docs/video-slot-timing-audit.md

      - name: Check owner measurement shortlist freshness
        run: |
          python3 scripts/report_fdc_hardware_handoff.py
          python3 scripts/report_serial_handoff.py
          python3 scripts/report_decap_value_fidelity.py
          python3 scripts/report_d41_timing_boundary.py
          python3 scripts/report_memory_timing_boundary.py
          python3 scripts/report_io_decode_boundary.py
          python3 scripts/report_video_analog_boundary.py
          python3 scripts/report_s4_interrupt_boundary.py
          python3 scripts/report_unmodeled_footprint_inventory.py
          python3 scripts/report_owner_measurement_shortlist.py
          git diff --exit-code -- \
            docs/fdc-hardware-handoff.md \
            docs/serial-handoff.md \
            docs/decap-value-fidelity.md \
            docs/d41-timing-boundary.md \
            docs/memory-timing-boundary.md \
            docs/io-decode-boundary.md \
            docs/video-analog-boundary.md \
            docs/s4-interrupt-boundary.md \
            docs/unmodeled-footprint-inventory.md \
            docs/owner-measurement-shortlist.md

      - name: Check replica bring-up report freshness
        run: |
          python3 kicad/report_replica_bringup_verification.py
          git diff --exit-code -- \
            docs/replica-bringup-verification-points.md

      - name: Check replica sourcing/BOM report freshness
        run: |
          python3 kicad/report_dual_config_bom.py
          python3 kicad/report_replica_sourcing_readiness.py
          git diff --exit-code -- \
            docs/replica-dual-config-bom.csv \
            docs/replica-dual-config-bom.md \
            docs/replica-sourcing-readiness.md

  lvs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Yosys for the HDL netlist. KiCad is intentionally NOT installed: the
      # schematic is generated deterministically from the board spec, so check.sh
      # falls back to the KiCad-free board-direct LVS (same connectivity). This
      # avoids fragile KiCad-version/schematic-format mismatches in CI. The real
      # kicad-cli round-trip is exercised locally (KiCad 10).
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Run LVS check
        run: sh sync/check.sh

  boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # iverilog runs the vm80a-based HDL sims; gcc builds the cosim oracle.
      # boot_check.sh boots the real ekta37 BIOS through cosim AND all three HDL
      # sim levels, bounded to 6000 video writes (~30s, never the slow full banner),
      # and asserts every level is byte-for-byte identical to cosim -- i.e. the merge
      # (the schematic structure executing the firmware) cannot silently regress.
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y gcc iverilog

      - name: Run FDC regression checks
        run: |
          (cd media/disks && sha256sum -c SHA256SUMS)
          (cd media/system && sha256sum -c SHA256SUMS)
          ./sync/juk_disk_check.sh
          ./sync/ekdos_fdc_probe.py
          ./sync/ekdos_jbasic_command_probe.py
          ./sync/ekdos_timing_reference.py
          python3 scripts/report_juku_top_fdc_alignment.py
          git diff --exit-code -- docs/juku-top-fdc-alignment.md
          ./sync/juku_top_fdc_prompt_check.sh
          ./sync/ekdos_checkpoint_reference.py
          ./sync/ekdos_ioseq_reference.py
          ./sync/juku_top_checkpoint_load_check.py
          ./sync/juku_top_checkpoint_resume_probe.py
          ./sync/fdc_check.sh

      - name: Run fast subsystem guards
        run: |
          ./sync/basic_cart_check.sh
          ./sync/prom_fallback_check.sh
          ./sync/beeper_check.sh
          ./sync/serial_check.sh
          ./sync/juku_top_periph_bus_check.sh
          ./sync/jmon33_hdl_probe.sh

      - name: Run Monitor and BASIC reference guards
        run: |
          ./sync/jmon33_interrupt_probe.py
          ./sync/jmon33_ready_probe.py
          ./sync/jmon33_command_probe.py
          ./sync/jmon33_idle_command_probe.py
          ./sync/juku_top_jbasic_prompt_check.sh

      - name: Run video output guards
        run: |
          ./sync/video_timing_check.sh
          ./sync/video_readout_check.sh

      - name: Check boot report freshness
        run: |
          git diff --exit-code -- \
            docs/ekdos-fdc-probe.md \
            docs/ekdos-jbasic-command-probe.md \
            docs/ekdos-timing-reference.md \
            docs/ekdos-checkpoint-reference.md \
            docs/ekdos-ioseq-reference.md \
            docs/juku-top-checkpoint-load.md \
            docs/juku-top-checkpoint-resume.md \
            docs/juku-top-periph-bus-check.md \
            docs/juku-top-jbasic-verilator-probe.md \
            docs/fdc-readiness.md \
            docs/basic-cart-readiness.md \
            docs/beeper-readiness.md \
            docs/serial-handoff.md \
            docs/jmon33-hdl-probe.md \
            docs/jmon33-interrupt-probe.md \
            docs/jmon33-ready-probe.md \
            docs/jmon33-command-probe.md \
            docs/jmon33-idle-command-probe.md \
            docs/video-timing-reference.md \
            docs/video-readout-readiness.md

      - name: Run boot regression check
        run: ./sync/boot_check.sh
