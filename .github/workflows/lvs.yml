name: LVS (KiCad <-> HDL connectivity)

on:
  push:
  pull_request:

jobs:
  lvs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Yosys for the HDL netlist. KiCad is intentionally NOT installed: the
      # schematic is generated deterministically from the board spec, so check.sh
      # falls back to the KiCad-free board-direct LVS (same connectivity). This
      # avoids fragile KiCad-version/schematic-format mismatches in CI. The real
      # kicad-cli round-trip is exercised locally (KiCad 10).
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Run LVS check
        run: sh sync/check.sh
