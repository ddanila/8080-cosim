name: CI (generic — syntax + doc consistency)

# Always-on, fast (<2 min): the checks that are relevant to any push. No Git LFS
# fetch -- nothing here reads the LFS-tracked photos (only ref/photos/**/*.jpg is
# LFS), so the generic job stays quick. Heavier work is split into path-gated
# workflows: reports.yml (report freshness, PROM/photo validation) and hdl.yml
# (LVS + behavioral boot). The deep cosim guard runs pre-push, not in CI.

on:
  push:
  pull_request:

jobs:
  generic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check script syntax
        run: |
          sh -n kicad/check_replica_manufacturing_ready.sh
          sh -n sync/ekdos_checkpoint_prompt_check.sh
          sh -n sync/ekdos_jbasic_checkpoint_check.sh
          sh -n sync/juku_top_jbasic_prompt_check.sh
          sh -n sync/juku_top_fdc_prompt_check.sh
          sh -n sync/juku_top_fdc_probe.sh
          sh -n sync/jmon33_checkpoint_deep_check.sh
          sh -n sync/video_timing_check.sh
          sh -n sync/video_readout_check.sh
          sh -n sync/serial_check.sh
          sh -n sync/ie7_check.sh
          sh -n sync/d96_check.sh
          sh -n sync/ie10_check.sh
          bash -n sync/kp12_check.sh
          sh -n sync/ag3_check.sh
          sh -n sync/cosim_check.sh
          sh -n sync/boot_check.sh
          sh -n sync/d2_ready_path_check.sh
          sh -n spinoffs/minimal-vga/sim/u24_dram_timing_check.sh
          bash -n spinoffs/minimal-vga/sync/revb_lvs.sh
          python3 -m py_compile \
            kicad/apply_a7_factory_wire_split.py \
            kicad/apply_a7_factory_wire_schematic_split.py \
            kicad/apply_a14_factory_wire_split.py \
            kicad/apply_a14_factory_wire_schematic_split.py \
            kicad/apply_a8_factory_wire_split.py \
            kicad/apply_a8_factory_wire_schematic_split.py \
            kicad/apply_a10_factory_wire_split.py \
            kicad/apply_a10_factory_wire_schematic_split.py \
            kicad/apply_a11_factory_wire_split.py \
            kicad/apply_a11_factory_wire_schematic_split.py \
            kicad/apply_a19_factory_wire_split.py \
            kicad/apply_a19_factory_wire_schematic_split.py \
            kicad/apply_a20_factory_wire_split.py \
            kicad/apply_a20_factory_wire_schematic_split.py \
            kicad/apply_x6_offboard_correction.py \
            kicad/check_x6_offboard_landings.py \
            kicad/check_c63_target_dnp.py \
            kicad/check_ras_resistor_bank.py \
            kicad/check_factory_wire_links.py \
            kicad/check_factory_wire_landing_registration.py \
