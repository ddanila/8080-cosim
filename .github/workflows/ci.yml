            kicad/report_fdc_lower_assembly_placement.py
          python3 -m py_compile kicad/report_d93_pin40_photo_chase.py
          python3 -m py_compile kicad/patch_d94_input_boundaries.py
          python3 -m py_compile \
            kicad/drc_gap_geometry.py \
            kicad/close_unconnected_gaps.py \
            kicad/close_gap_by_ripup.py

      - name: Check C63 target-board DNP
        run: python3 kicad/check_c63_target_dnp.py

      - name: Check FDC write-precomp network
        run: python3 kicad/check_fdc_precomp_network.py

      - name: Check FDC clock mux
        run: python3 kicad/check_fdc_clock_mux.py

      - name: Check FDC recovery counter
        run: python3 kicad/check_fdc_recovery_counter.py

      - name: Check FDC read-clock toggle
        run: python3 kicad/check_fdc_read_clock_toggle.py

      - name: Check exact-revision FDC unused pins
        run: python3 kicad/check_fdc_unused_pins.py

      - name: Check D93 reset and static paths
        run: python3 kicad/check_d93_static_paths.py

      - name: Check D93 HLT selector and RG disposition
        run: python3 kicad/check_d93_hlt_rg.py

      - name: Check D99 timing and D100 control continuation
        run: python3 kicad/check_d99_source_paths.py

      - name: Check documentation consistency
        run: python3 scripts/check_documentation_consistency.py

      - name: Check spin-off shared commons
        run: python3 scripts/check_spinoff_commons.py

      - name: Check rev B board connectivity + netlist completeness
        run: python3 scripts/check_revb_boards.py --completeness
